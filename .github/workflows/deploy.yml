name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          debug: true
          command_timeout: 20m
          script: |
            set -euo pipefail

            cd "${{ secrets.SERVER_PATH }}"

            echo "==> Pulling latest changes"
            git fetch --all --prune
            git reset --hard origin/main

            cd print-box

            if [ ! -f .env ]; then
              echo "ERROR: print-box/.env not found on the server. Aborting."
              exit 1
            fi

            echo "==> Building and starting containers"
            docker compose pull db || true
            docker compose up -d --build --remove-orphans

            echo "==> Pruning dangling images"
            docker image prune -f

            echo "==> Waiting for app to be healthy"
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null -m 5 http://127.0.0.1:3000; then
                echo "App responding on :3000"
                exit 0
              fi
              echo "  attempt $i/30 — waiting 5s"
              sleep 5
            done

            echo "ERROR: App did not respond on :3000 after 150s. Last logs:"
            docker compose logs --tail=80 app
            exit 1
